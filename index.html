<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kad Raya Digital Premium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Quicksand:wght@300;500&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        :root {
            --olive-dark: #2d3416;
            --olive-primary: #556b2f;
            --gold: #d4af37;
            --gold-light: #f1e5ac;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #000;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 2s ease;
        }

        /* Background Transition */
        .bg-raya {
            background: radial-gradient(circle at center, var(--olive-primary), var(--olive-dark)) !important;
        }

        /* Canvas Bunga Api */
        #fw-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        /* Lampu Kelip-Kelip */
        .fairy-lights {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            z-index: 15;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--gold-light);
            box-shadow: 0 0 10px var(--gold);
            animation: flash 1.5s infinite alternate;
        }

        @keyframes flash {
            from {
                opacity: 0.3;
                transform: scale(0.8);
                box-shadow: 0 0 5px var(--gold);
            }

            to {
                opacity: 1;
                transform: scale(1.1);
                box-shadow: 0 0 20px var(--gold);
            }
        }

        /* Ketupat Floating */
        .ketupat-bg {
            position: absolute;
            font-size: 2rem;
            opacity: 0;
            z-index: 6;
            transition: opacity 2s ease;
            pointer-events: none;
        }

        /* Intro UI */
        #intro-ui {
            position: relative;
            z-index: 100;
            text-align: center;
        }

        .btn-open {
            padding: 18px 45px;
            background: rgba(0, 0, 0, 0.6);
            color: var(--gold);
            border: 2px solid var(--gold);
            border-radius: 50px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.4s;
            backdrop-filter: blur(5px);
            font-weight: bold;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .btn-open:hover {
            background: var(--gold);
            color: white;
            box-shadow: 0 0 30px var(--gold);
        }

        /* Main Card */
        .card-container {
            position: relative;
            z-index: 20;
            display: none;
            opacity: 0;
            width: 90%;
            max-width: 480px;
            transform: translateY(50px);
            transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .raya-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 30px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold-light);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .sub-text {
            color: var(--white);
            letter-spacing: 4px;
            font-weight: 300;
            margin-bottom: 25px;
        }

        .message {
            line-height: 1.8;
            color: #f0f0f0;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .footer-names {
            color: var(--gold-light);
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            padding-top: 20px;
        }

        /* Music Placeholder */
        #music-container {
            position: fixed;
            bottom: -100px;
        }
    </style>
</head>

<body>

    <div class="fairy-lights" id="lights">
        <div class="light" style="animation-delay: 0s"></div>
        <div class="light" style="animation-delay: 0.2s"></div>
        <div class="light" style="animation-delay: 0.4s"></div>
        <div class="light" style="animation-delay: 0.6s"></div>
        <div class="light" style="animation-delay: 0.8s"></div>
        <div class="light" style="animation-delay: 1s"></div>
    </div>

    <canvas id="fw-canvas"></canvas>

    <div id="intro-ui">
        <button class="btn-open" id="start-btn">KLIK UNTUK KEJUTAN ✨</button>
    </div>

    <div class="card-container" id="main-card">
        <div class="raya-card">
            <div style="font-size: 3rem; margin-bottom: 10px;">🌙</div>
            <h1>Selamat Hari Raya</h1>
            <p class="sub-text">AIDILFITRI 2026</p>
            <p class="message">
                "Bulan Syawal menjelma tiba, <br>
                Membawa rahmat buat semua, <br>
                Salah dan silap lupakan saja, <br>
                Maaf zahir batin dipinta."
            </p>
            <div class="footer-names">
                <p>Daripada:</p>
                <h3 style="margin-top:5px">Keluarga Encik Jasni & Sekeluarga</h3>
            </div>
        </div>
    </div>

    <div id="music-container">
        <iframe id="yt-player" width="0" height="0" src="" frameborder="0" allow="autoplay"></iframe>
    </div>

    <script>
        const canvas = document.getElementById('fw-canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const card = document.getElementById('main-card');
        const lights = document.getElementById('lights');
        let fireworks = [];
        let particles = [];
        let runningFireworks = true;

        // Setup Canvas
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        // Bunga Api Logic
        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.targetY = Math.random() * (canvas.height * 0.4);
                this.speed = 6;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
                this.done = false;
            }
            update() {
                this.y -= this.speed;
                if (this.y <= this.targetY) {
                    this.done = true;
                    for (let i = 0; i < 50; i++) particles.push(new Particle(this.x, this.y, this.color));
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.angle = Math.random() * Math.PI * 2;
                this.velocity = Math.random() * 5 + 2;
                this.life = 1;
                this.decay = 0.02;
            }
            update() {
                this.x += Math.cos(this.angle) * this.velocity;
                this.y += Math.sin(this.angle) * this.velocity + 0.5;
                this.life -= this.decay;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            if (!runningFireworks && particles.length === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (runningFireworks && Math.random() < 0.08) fireworks.push(new Firework());

            fireworks.forEach((f, i) => {
                f.update(); f.draw();
                if (f.done) fireworks.splice(i, 1);
            });

            particles.forEach((p, i) => {
                p.update(); p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }

        // Start Intro Bunga Api
        animate();

        // Interaction
        startBtn.addEventListener('click', () => {
            // 1. Stop Fireworks & Change BG
            runningFireworks = false;
            document.body.classList.add('bg-raya');

            // 2. Play YouTube Music
            const ytID = "mfGHKn6uN-8";
            document.getElementById('yt-player').src = `https://www.youtube.com/embed/${ytID}?autoplay=1`;

            // 3. Hide Intro
            startBtn.style.display = 'none';

            // 4. Show Card & Lights
            setTimeout(() => {
                card.style.display = 'block';
                lights.style.opacity = '1';
                createKetupatIcons(); // Add ketupat background
                setTimeout(() => {
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 100);
            }, 800);
        });

        function createKetupatIcons() {
            for (let i = 0; i < 10; i++) {
                const k = document.createElement('div');
                k.className = 'ketupat-bg';
                k.innerHTML = '🏮';
                k.style.left = Math.random() * 90 + '%';
                k.style.top = Math.random() * 90 + '%';
                k.style.opacity = '0.2';
                k.style.animation = `flash ${Math.random() * 2 + 2}s infinite alternate`;
                document.body.appendChild(k);
                setTimeout(() => k.style.opacity = '0.2', 100);
            }
        }
    </script>
</body>

</html>

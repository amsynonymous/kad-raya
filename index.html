<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kad Raya Digital </title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Quicksand:wght@300;500&display=swap"
        rel="stylesheet">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">

    <style>
        :root {
            --olive-dark: #2d3416;
            --olive-primary: #556b2f;
            --gold: #d4af37;
            --gold-light: #f1e5ac;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #000;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 2s ease;
        }

        .bg-raya {
            background-image: url('bg.png') !important;
            background-color: var(--olive-dark);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(10px) brightness(0.5);
            transform: scale(1.1);
            transition: filter 2.5s ease, transform 2.5s ease;
        }

        .bg-raya-active {
            filter: blur(0px) brightness(1);
            transform: scale(1);
        }

        #fw-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            transition: opacity 1.5s ease;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 1;
            transition: opacity 1s ease;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid var(--olive-primary);
            border-top: 5px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        .loading-text {
            color: var(--gold-light);
            letter-spacing: 3px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .fairy-lights {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            z-index: 15;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--gold-light);
            box-shadow: 0 0 10px var(--gold);
            animation: flash 1.5s infinite alternate;
        }

        @keyframes flash {
            from {
                opacity: 0.3;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1.1);
                box-shadow: 0 0 20px var(--gold);
            }
        }

        #intro-ui {
            position: relative;
            z-index: 100;
            text-align: center;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }

        .envelope-wrapper {
            font-size: 150px;
            filter: drop-shadow(0 0 20px var(--gold));
            animation: pulse 2s infinite ease-in-out;
            transition: transform 0.3s;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .card-container {
            position: relative;
            z-index: 20;
            display: none;
            opacity: 0;
            width: 90%;
            max-width: 480px;
            transform: translateY(50px);
            transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .raya-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .family-photo-container {
            width: 100%;
            height: 200px;
            border: 3px solid var(--gold);
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .family-photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold-light);
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        .sub-text {
            color: var(--white);
            letter-spacing: 4px;
            font-weight: 300;
            margin-bottom: 15px;
        }

        .message {
            line-height: 1.6;
            color: #f0f0f0;
            margin-bottom: 20px;
            font-size: 1rem;
            min-height: 80px;
        }

        .footer-names {
            color: var(--gold-light);
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            padding-top: 15px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .ketupat-bg {
            position: absolute;
            z-index: 6;
            transition: opacity 2s ease;
            pointer-events: none;
            color: var(--gold-light);
            filter: drop-shadow(0 0 8px var(--gold));
        }

        .typing-cursor::after {
            content: "|";
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div id="loading-overlay">
        <div class="loader"></div>
        <div class="loading-text">Menyediakan Ucapan...</div>
    </div>

    <div class="fairy-lights" id="lights">
        <div class="light" style="animation-delay: 0s"></div>
        <div class="light" style="animation-delay: 0.2s"></div>
        <div class="light" style="animation-delay: 0.4s"></div>
        <div class="light" style="animation-delay: 0.6s"></div>
        <div class="light" style="animation-delay: 0.8s"></div>
        <div class="light" style="animation-delay: 1s"></div>
    </div>

    <canvas id="fw-canvas"></canvas>

    <div id="intro-ui">
        <div class="envelope-wrapper">✉️</div>
        <p class="click-hint">Buka Kad Raya</p>
    </div>

    <div class="card-container" id="main-card">
        <div class="raya-card">
            <div class="family-photo-container">
                <img src="keluarga.jpg" alt="Foto Keluarga" onerror="this.style.display='none'">
                <div style="color:var(--gold-light); font-size:0.7rem; position:absolute;"><img src="gambar.jpg" alt="">
                </div>
            </div>

            <div style="font-size: 2.5rem; margin-bottom: 5px;">🌙</div>
            <h1 id="type-title"></h1>
            <p class="sub-text" id="type-date"></p>
            <p class="message" id="type-message"></p>

            <div class="footer-names" id="footer-names">
                <p>Ikhlas Daripada:</p>
                <h3 style="margin-top:5px">Encik Jasni & Puan Ramlah Sekeluarga</h3>
            </div>
        </div>
    </div>

    <audio id="lagu" loop preload="auto">
        <source src="suasana_di_hari_raya.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('fw-canvas');
        const ctx = canvas.getContext('2d');
        const introUi = document.getElementById('intro-ui');
        const card = document.getElementById('main-card');
        const lights = document.getElementById('lights');
        const loadingOverlay = document.getElementById('loading-overlay');

        let fireworks = [];
        let particles = [];
        let stars = [];
        let runningFireworks = true;

        // Sound Effect letupan bunga api
        const fireworkSound = new Audio('https://assets.mixkit.co/active_storage/sfx/611/611-preview.mp3');
        fireworkSound.volume = 0.2;

        const textData = {
            title: "Selamat Hari Raya",
            date: "AIDILFITRI 1447 HIJRAH",
            message: "Bulan Syawal hadir penuh keberkatan, Menyinari hati dengan keampunan, Segala khilaf kami mohon dimaafkan, Salam Aidilfitri, maaf zahir dan batin."
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }
        window.addEventListener('resize', resize);

        function initStars() {
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    opacity: Math.random()
                });
            }
        }

        function drawStars() {
            ctx.save();
            stars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
                if (Math.random() > 0.98) s.opacity = Math.random();
            });
            ctx.restore();
        }

        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.targetY = Math.random() * (canvas.height * 0.5);
                this.speed = 6;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
                this.done = false;
            }
            update() {
                this.y -= this.speed;
                if (this.y <= this.targetY) {
                    this.done = true;
                    // Bunyi letupan bunga api
                    if (runningFireworks) {
                    }
                    const particleCount = Math.random() * 60 + 40;
                    for (let i = 0; i < particleCount; i++) {
                        particles.push(new Particle(this.x, this.y, this.color));
                    }
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.angle = Math.random() * Math.PI * 2;
                this.velocity = Math.random() * 6 + 1;
                this.friction = 0.96;
                this.gravity = 0.15;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
            }
            update() {
                this.velocity *= this.friction;
                this.x += Math.cos(this.angle) * this.velocity;
                this.y += Math.sin(this.angle) * this.velocity + 0.5;
                this.life -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.random() * 2 + 1, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function animate() {
            if (!runningFireworks && particles.length === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawStars();
            if (runningFireworks && Math.random() < 0.06) fireworks.push(new Firework());
            fireworks.forEach((f, i) => { f.update(); f.draw(); if (f.done) fireworks.splice(i, 1); });
            particles.forEach((p, i) => { p.update(); p.draw(); if (p.life <= 0) particles.splice(i, 1); });
            requestAnimationFrame(animate);
        }

        async function typeWriter(elementId, text, speed = 100) {
            const element = document.getElementById(elementId);
            element.classList.add('typing-cursor');
            for (let i = 0; i < text.length; i++) {
                element.innerHTML += text.charAt(i);
                await new Promise(res => setTimeout(res, speed));
            }
            element.classList.remove('typing-cursor');
        }

        resize();
        animate();

        introUi.addEventListener('click', async () => {
            // MULA MAINKAN LAGU SELEPAS KLIK
            const player = document.getElementById('lagu');
            player.volume = 0.6;
            player.play().catch(() => { });

            // Tunjukkan Loading
            introUi.style.opacity = '0';
            setTimeout(() => {
                introUi.style.display = 'none';
                loadingOverlay.style.display = 'flex';
            }, 800);

            // Masa loading 2 saat
            setTimeout(async () => {
                loadingOverlay.style.opacity = '0';

                setTimeout(async () => {
                    loadingOverlay.style.display = 'none';
                    runningFireworks = false;
                    canvas.style.opacity = '0';

                    document.body.classList.add('bg-raya');
                    setTimeout(() => {
                        document.body.classList.add('bg-raya-active');
                    }, 50);

                    setTimeout(async () => {
                        card.style.display = 'block';
                        lights.style.opacity = '1';
                        createGlowingStars();

                        setTimeout(async () => {
                            card.style.opacity = '1';
                            card.style.transform = 'translateY(0)';

                            await typeWriter("type-title", textData.title, 120);
                            await typeWriter("type-date", textData.date, 80);
                            await typeWriter("type-message", textData.message, 50);

                            document.getElementById('footer-names').style.opacity = "1";
                        }, 1000);
                    }, 800);
                }, 1000);

            }, 2000);
        });

        function createGlowingStars() {
            for (let i = 0; i < 15; i++) {
                const k = document.createElement('div');
                k.className = 'ketupat-bg';
                k.innerHTML = '✦';
                k.style.left = Math.random() * 90 + '%';
                k.style.top = Math.random() * 90 + '%';
                k.style.fontSize = (Math.random() * 15 + 10) + 'px';
                k.style.animation = `flash ${Math.random() * 2 + 2}s infinite alternate`;
                document.body.appendChild(k);
                setTimeout(() => k.style.opacity = '0.6', 100);
            }
        }
    </script>
</body>

</html>
